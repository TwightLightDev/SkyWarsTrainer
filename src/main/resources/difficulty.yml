# ═══════════════════════════════════════════════════════════
# SkyWarsTrainer — Difficulty Configuration
# ═══════════════════════════════════════════════════════════
# Each difficulty level defines numeric parameters that every
# subsystem reads. Do NOT use if/else per difficulty; subsystems
# read these parameters and scale smoothly.

difficulties:
  BEGINNER:
    # Reaction time range in milliseconds
    reactionTimeMin: 600
    reactionTimeMax: 1200
    # Aim accuracy from 0.0 (terrible) to 1.0 (perfect)
    aimAccuracy: 0.3
    # Maximum degrees the bot can rotate per tick toward a target
    aimSpeedDegPerTick: 3.0
    # Clicks per second for melee attacks
    maxCPS: 5
    # Variance in CPS (actual CPS = random in [maxCPS - variance, maxCPS])
    cpsVariance: 3.0
    # Probability of performing a sprint-reset on each hit
    sprintResetChance: 0.0
    # Efficiency of W-tap timing (0 = never, 1 = frame-perfect)
    wTapEfficiency: 0.0
    # How aggressively the bot strafes during combat (0 = stationary)
    strafeIntensity: 0.1
    # How unpredictable strafe patterns are (0 = simple L-R)
    strafeUnpredictability: 0.0
    # Probability of block-hitting between melee swings
    blockHitChance: 0.0
    # Accuracy for projectile aiming (snowball, bow, egg, rod)
    projectileAccuracy: 0.15
    # Blocks placed per second while bridging
    bridgeSpeed: 1.5
    # Highest bridge technique the bot can attempt
    # Options: NORMAL, SPEED, NINJA, MOONWALK, GOD
    bridgeMaxType: "NORMAL"
    # Probability of a bridging mistake per block placed
    bridgeFailRate: 0.15
    # Multiplier on how fast the bot loots chests
    lootSpeedMultiplier: 0.5
    # How well the bot decides which items to take (0 = random, 1 = optimal)
    lootDecisionQuality: 0.3
    # Skill at managing inventory (equip speed, organization)
    inventoryManageSkill: 0.2
    # How well the hotbar is organized (0 = chaotic, 1 = perfect layout)
    hotbarOrganization: 0.1
    # Overall quality of strategic decisions (noise reduction in utility AI)
    decisionQuality: 0.3
    # Block radius the bot can detect enemies, chests, terrain
    awarenessRadius: 15
    # HP fraction below which the bot considers fleeing
    fleeHealthThreshold: 0.15
    # Skill with ender pearl usage (0 = won't use, 1 = clutch pearls)
    pearlUsageIQ: 0.0
    # Skill with potion usage (timing, type selection)
    potionUsageIQ: 0.0
    # Average maximum combo length the bot can sustain
    comboLength: 1
    # Skill with fishing rod (aim, timing, combo follow-up)
    rodUsageSkill: 0.0
    # Chance to place blocks tactically during combat
    blockPlaceChance: 0.05
    # How aggressively the bot places blocks to break enemy combos
    comboBreakPriority: 0.1
    # Percentage of incoming knockback the bot can reduce via movement countering
    antiKBReduction: 0.0
    # Success chance for water bucket MLG when falling
    waterBucketMLG: 0.0
    # Number of intentional mistakes per minute (makes bot feel human)
    mistakeFrequency: 12.0
    # Constant subtle head movement noise when idle (degrees)
    headMovementNoise: 0.3
    # Chance to panic-drop items when near death
    itemDropOnDeathPanic: 0.4

