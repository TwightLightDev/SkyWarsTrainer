# ══════════════════════════════════════════════════════════════
# SkyWarsTrainer Configuration
# ══════════════════════════════════════════════════════════════

general:
  max-bots-per-game: 8
  bot-tick-rate: 1
  decision-interval: 10
  map-scan-interval: 50
  default-difficulty: MEDIUM
  default-personality-count: 2
  enable-chat: true
  enable-skins: true
  debug-mode: false

performance:
  max-pathfinding-ms-per-tick: 2
  stagger-bot-ticks: true
  cache-map-scan: true
  max-total-ms-per-tick: 8

game-hook:
  plugin: "auto"

skins:
  use-random-skins: true
  skin-list:
    - "Steve"
    - "Alex"
    - "Notch"
    - "jeb_"
    - "Dinnerbone"
    - "Grumm"
    - "MHF_Chicken"
    - "MHF_Pig"
    - "MHF_Sheep"
    - "MHF_Cow"
    - "MHF_Villager"
    - "MHF_Blaze"
    - "MHF_Spider"
    - "MHF_Enderman"
    - "MHF_Skeleton"
    - "MHF_Zombie"
    - "MHF_Creeper"
    - "MHF_Golem"
    - "MHF_Squid"
    - "MHF_Slime"

random-names:
  prefixes:
    - ""
    - "xX"
    - "Pro"
    - "The"
    - "Mr"
    - "ii"
    - "_"
    - "Not"
    - "Im"
    - "Ez"
  roots:
    - "Player"
    - "Warrior"
    - "Knight"
    - "Ninja"
    - "Shadow"
    - "Dragon"
    - "Storm"
    - "Blaze"
    - "Ice"
    - "Fire"
    - "Wolf"
    - "Fox"
    - "Eagle"
    - "Hawk"
    - "Tiger"
    - "Lion"
    - "Bear"
    - "Panda"
    - "Viper"
    - "Cobra"
  suffixes:
    - ""
    - "Xx"
    - "_YT"
    - "HD"
    - "PvP"
    - "123"
    - "_"
    - "MC"
    - "God"
    - "King"
    - "Jr"
    - "Pro"
